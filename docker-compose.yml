services:
  stock-alert-agent:
    image: waelemam/stock-alert-agent:latest
    container_name: stock-alert-agent
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      - STOCK_AGENT_API_KEY=${STOCK_AGENT_API_KEY}
      - CONFIG_DIR=/configs
      - DEFAULT_CONFIG=rbc.yaml
      - TZ=America/Toronto
    ports:
      - "8000:8000"
    volumes:
      - /containers/stock-alert-agent/config:/configs:ro
    restart: unless-stopped

  stock-alert-scheduler:
    image: alpine:latest
    container_name: stock-alert-scheduler
    depends_on:
      - stock-alert-agent
    environment:
      - STOCK_AGENT_API_KEY=${STOCK_AGENT_API_KEY}
      - TZ=America/Toronto
    volumes:
      - /containers/stock-alert-agent/crontab:/etc/crontabs/root:ro
    command: >
      sh -c "apk add --no-cache curl tzdata && crond -f -l 8"
    restart: unless-stopped
